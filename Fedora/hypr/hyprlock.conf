general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/HenrietteRonnerKnip2.jpg 
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 1 # Efek blur tipis sesuai permintaanmu
    blur_size = 2
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Jam (Time)
label {
    monitor =
    text = $TIME
    color = rgba(242, 229, 213, 1.0)
    font_size = 95
    font_family = SF Pro Display Bold
    position = 0, 80
    halign = center
    valign = center
}

# Tanggal (Date)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(242, 229, 213, 0.75)
    font_size = 22
    font_family = SF Pro Display
    position = 0, -10
    halign = center
    valign = center
}

# Input Field (Tempat ngetik password)
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(242, 229, 213, 0.1)
    font_color = rgb(242, 229, 213)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}
